<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法科盤前</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0d14; --surface:#121622; --surface2:#181d2c;
  --line:rgba(255,255,255,.07); --line2:rgba(255,255,255,.13);
  --text:#e7eaf2; --muted:#838aaa;
  --up:#ff4d56; --down:#1fd1a3; --gold:#d4af37; --neutral:#7a8094;
  --mono:"JetBrains Mono",monospace;
  --sans:"Noto Sans TC",sans-serif;
  --serif:"Noto Serif TC",serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);
  line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}

/* ── header ── */
header{border-bottom:1px solid var(--line);padding:14px 20px;
  background:rgba(10,13,20,.9);backdrop-filter:blur(10px);
  position:sticky;top:0;z-index:20;
  display:flex;align-items:center;justify-content:space-between}
.brand{font-family:var(--serif);font-size:18px;font-weight:700;letter-spacing:1px}
.hright{display:flex;align-items:center;gap:12px}
.datebadge{font-family:var(--mono);font-size:12px;color:var(--muted)}
.refresh-btn{font-family:var(--mono);font-size:12px;
  background:var(--surface2);color:var(--muted);
  border:1px solid var(--line2);border-radius:6px;
  padding:6px 12px;cursor:pointer;transition:.15s}
.refresh-btn:hover{color:var(--text);border-color:rgba(255,255,255,.25)}
.refresh-btn:disabled{opacity:.4;cursor:wait}

/* ── main layout ── */
main{max-width:560px;margin:0 auto;padding:32px 20px 64px}

/* ── 今日建議卡 ── */
.advice-card{
  border-radius:20px;
  border:1px solid var(--line2);
  background:var(--surface);
  padding:36px 28px 28px;
  text-align:center;
  margin-bottom:24px;
}
.advice-label{font-family:var(--mono);font-size:11px;letter-spacing:3px;
  color:var(--muted);text-transform:uppercase;margin-bottom:16px}
.signal-circle{
  width:160px;height:160px;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin:0 auto 20px;
  border:3px solid var(--neutral);
  box-shadow:0 0 0 6px var(--bg),0 0 0 7px var(--neutral);
  transition:.3s;
}
.signal-circle.up{border-color:var(--up);box-shadow:0 0 0 6px var(--bg),0 0 0 7px var(--up),0 0 48px rgba(255,77,86,.2)}
.signal-circle.down{border-color:var(--down);box-shadow:0 0 0 6px var(--bg),0 0 0 7px var(--down),0 0 48px rgba(31,209,163,.18)}
.signal-text{font-family:var(--serif);font-size:44px;font-weight:700;line-height:1}
.signal-circle.up .signal-text{color:var(--up)}
.signal-circle.down .signal-text{color:var(--down)}
.signal-circle.neutral .signal-text{color:var(--neutral)}
.signal-sub{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:6px}

.advice-desc{
  font-size:16px;font-weight:500;margin-bottom:8px;
  min-height:1.6em;
}
.advice-note{font-size:13px;color:var(--muted);margin-bottom:20px}

.conf-bar-wrap{display:flex;align-items:center;gap:10px;
  justify-content:center;margin-bottom:0}
.conf-label{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap}
.conf-bar{flex:1;max-width:200px;height:5px;border-radius:3px;
  background:var(--surface2);overflow:hidden}
.conf-bar-fill{height:100%;border-radius:3px;background:var(--gold);transition:width .5s}

/* ── 市場概況 ── */
.section-title{font-family:var(--mono);font-size:11px;letter-spacing:2px;
  color:var(--muted);text-transform:uppercase;margin-bottom:12px}
.signals-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.sig-card{background:var(--surface);border:1px solid var(--line);
  border-radius:12px;padding:14px 16px}
.sig-name{font-size:12px;color:var(--muted);margin-bottom:4px}
.sig-val{font-family:var(--mono);font-size:22px;font-weight:600}
.sig-val.up{color:var(--up)} .sig-val.down{color:var(--down)}
.sig-hint{font-size:11px;color:var(--muted);margin-top:2px}

/* ── 詳細分析（展開） ── */
.detail-toggle{
  width:100%;background:var(--surface);border:1px solid var(--line2);
  border-radius:12px;color:var(--muted);font-family:var(--sans);font-size:13px;
  padding:14px 18px;cursor:pointer;text-align:left;
  display:flex;align-items:center;justify-content:space-between;
  transition:.15s;margin-bottom:0;
}
.detail-toggle:hover{border-color:rgba(255,255,255,.2);color:var(--text)}
.detail-toggle .arrow{font-size:10px;transition:transform .25s}
.detail-toggle.open .arrow{transform:rotate(180deg)}

.detail-panel{
  display:none;
  background:var(--surface);border:1px solid var(--line2);
  border-top:none;border-radius:0 0 12px 12px;
  padding:20px 18px;
}
.detail-panel.open{display:block}

/* detail 內部元件 */
.dp-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:2px;
  color:var(--muted);text-transform:uppercase;margin:18px 0 8px}
.dp-eyebrow:first-child{margin-top:0}

.mini-signals{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.mini-sig{background:var(--surface2);border:1px solid var(--line);
  border-radius:8px;padding:10px 12px}
.mini-sig .n{font-size:11px;color:var(--muted);margin-bottom:2px}
.mini-sig .v{font-family:var(--mono);font-size:16px;font-weight:600}
.mini-sig .v.up{color:var(--up)} .mini-sig .v.down{color:var(--down)} .mini-sig .v.neutral{color:var(--neutral)}

.seg{display:inline-flex;background:var(--surface2);border:1px solid var(--line);
  border-radius:8px;padding:3px;gap:3px;margin:8px 0 12px}
.seg button{font-family:var(--mono);font-size:11px;background:transparent;
  color:var(--muted);border:none;border-radius:6px;padding:6px 12px;cursor:pointer}
.seg button.on{background:var(--bg);color:var(--text)}

.kill{display:flex;align-items:center;gap:12px;border-radius:8px;
  padding:12px 14px;margin-bottom:12px;border:1px solid var(--line2);background:var(--surface2)}
.kill .badge{font-family:var(--mono);font-size:11px;font-weight:700;
  padding:4px 10px;border-radius:5px;white-space:nowrap}
.kill.pass .badge{background:rgba(212,175,55,.15);color:var(--gold)}
.kill.fail .badge{background:rgba(122,128,148,.12);color:var(--muted)}
.kill .txt{font-size:12px;color:var(--muted)}

.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:4px}
.metric{background:var(--surface2);border:1px solid var(--line);border-radius:8px;padding:11px 13px}
.metric .ml{font-size:11px;color:var(--muted);margin-bottom:4px}
.metric .mv{font-family:var(--mono);font-size:18px;font-weight:600}
.metric .mv.good{color:var(--gold)} .metric .mv.bad{color:var(--up)}

table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:4px}
th,td{text-align:right;padding:8px 10px;border-bottom:1px solid var(--line)}
th:first-child,td:first-child{text-align:left}
th{font-family:var(--mono);font-size:10px;color:var(--muted);font-weight:400}
td.mono{font-family:var(--mono)}
td.pos{color:var(--up)} td.neg{color:var(--down)}
.tag{display:inline-block;font-family:var(--mono);font-size:10px;
  padding:1px 6px;border-radius:3px;border:1px solid var(--line2);color:var(--muted)}
.tag.sig{color:var(--gold);border-color:rgba(212,175,55,.5)}
.bar{display:inline-block;height:6px;border-radius:2px;vertical-align:middle}
.bar.g{background:var(--gold)} .bar.r{background:var(--up)}
tr.dim{opacity:.4}

.disclaimer{margin-top:32px;font-size:11px;color:var(--muted);
  border-top:1px solid var(--line);padding-top:14px}

.loading{color:var(--muted);font-family:var(--mono);font-size:12px;padding:16px 0;text-align:center}
.err{color:var(--up);font-size:12px;background:rgba(255,77,86,.07);
  border:1px solid rgba(255,77,86,.25);border-radius:8px;padding:12px;margin-top:8px}
</style>
</head>
<body>

<header>
  <div class="brand">法科盤前</div>
  <div class="hright">
    <span class="datebadge" id="asof">—</span>
    <button class="refresh-btn" id="refreshBtn" onclick="doRefresh()">重抓資料</button>
  </div>
</header>

<main>

  <!-- ── 今日建議 ── -->
  <div class="advice-card" id="adviceCard">
    <div class="advice-label">今日日內交易建議</div>
    <div class="signal-circle neutral" id="signalCircle">
      <div class="signal-text" id="signalText">—</div>
      <div class="signal-sub" id="signalSub">載入中</div>
    </div>
    <div class="advice-desc" id="adviceDesc">正在分析市場資料⋯</div>
    <div class="advice-note" id="adviceNote"></div>
    <div class="conf-bar-wrap">
      <span class="conf-label">信心</span>
      <div class="conf-bar"><div class="conf-bar-fill" id="confFill" style="width:0%"></div></div>
      <span class="conf-label" id="confPct">—</span>
    </div>
  </div>

  <!-- ── 市場概況 ── -->
  <div class="section-title">今日盤前市場訊號</div>
  <div class="signals-grid" id="signalsGrid">
    <div class="loading">載入中…</div>
  </div>

  <!-- ── 詳細分析（可展開） ── -->
  <button class="detail-toggle" id="detailToggle" onclick="toggleDetail()">
    <span>詳細分析報告</span>
    <span class="arrow">▼</span>
  </button>
  <div class="detail-panel" id="detailPanel">

    <div class="dp-eyebrow">其他目標參考</div>
    <div class="mini-signals" id="miniSignals"></div>

    <div class="dp-eyebrow">目標切換</div>
    <div class="seg" id="seg">
      <button data-t="intraday" class="on">日內延續（主）</button>
      <button data-t="gap">開盤跳空</button>
      <button data-t="day">全日方向</button>
    </div>

    <div id="killBox"></div>

    <div class="dp-eyebrow">樣本外交易績效（已扣成本）</div>
    <div class="mgrid" id="metrics"><div class="loading">…</div></div>

    <div class="dp-eyebrow">信心分位數報酬</div>
    <table id="confTable"><tbody><tr><td class="loading">…</td></tr></tbody></table>

    <div class="dp-eyebrow">相關性排名</div>
    <table id="corrTable"><tbody><tr><td class="loading">…</td></tr></tbody></table>

    <p style="font-size:11px;color:var(--muted);margin-top:16px" id="resMeta"></p>
  </div>

  <p class="disclaimer">本頁為量化訊號輔助參考，非投資建議。歷史績效不代表未來結果。</p>
</main>

<script>
const fmt = v => (v > 0 ? "+" : "") + Number(v).toFixed(2);
const show = v => (v === null || v === undefined) ? "—" : v;
let RESEARCH = null, curT = "intraday";

/* ── 載入 ── */
async function load(){ loadToday(); loadResearch(); }

async function loadToday(){
  try{
    const d = await (await fetch("/api/today")).json();
    if(d.error) throw new Error(d.error);
    document.getElementById("asof").textContent = d.date;
    renderAdvice(d);
    renderSignals(d.features);
  }catch(e){
    document.getElementById("adviceDesc").textContent = "載入失敗：" + e.message;
  }
}

/* ── 核心建議卡 ── */
const ADVICE_TEXT = {
  "偏多": { desc: "今天適合尋找做多進場點", note: "開盤後等回測低點或突破，再考慮進場做多" },
  "偏空": { desc: "今天適合尋找做空進場點", note: "開盤後等反彈高點或跌破支撐，再考慮進場做空" },
  "中性": { desc: "今天方向不明確，建議觀望", note: "市場訊號混雜，可等盤中方向確認後再決定" },
};
function sc(dir){ return dir === "偏多" ? "up" : dir === "偏空" ? "down" : "neutral"; }
function sigChar(dir){ return dir === "偏多" ? "多" : dir === "偏空" ? "空" : "觀"; }

function renderAdvice(d){
  const m = d.predictions.intraday;
  const dir = m.direction;
  const cls = sc(dir);
  const info = ADVICE_TEXT[dir] || { desc: dir, note: "" };

  document.getElementById("signalCircle").className = "signal-circle " + cls;
  document.getElementById("signalText").textContent = sigChar(dir);
  document.getElementById("signalSub").textContent = dir;
  document.getElementById("adviceDesc").textContent = info.desc;
  document.getElementById("adviceNote").textContent = info.note;
  document.getElementById("confFill").style.width = m.confidence + "%";
  document.getElementById("confPct").textContent = m.confidence + "%";

  // 存起來給詳細面板用
  window._today = d;
}

/* ── 市場訊號格子 ── */
const SIG_LABEL = {
  "NQ=F": "美國科技股（NQ）昨夜",
  "ES=F": "美國大盤（ES）昨夜",
  "^KS11": "韓股今早開盤",
  "^N225": "日股今早開盤",
  "TWD=X": "台幣匯率昨夜",
  "^VIX": "恐慌指數（VIX）",
};
const SIG_HINT = {
  "NQ=F": "↑ 對台股偏正面",
  "ES=F": "↑ 對台股偏正面",
  "^KS11": "↑ 亞洲市場同步",
  "^N225": "↑ 亞洲市場同步",
  "TWD=X": "↑ 台幣貶值，偏中性",
  "^VIX":  "↑ 波動風險偏高",
};
// 只顯示最重要的 4 個
const SHOW_TICKERS = ["NQ=F", "ES=F", "^KS11", "^N225"];

function renderSignals(feats){
  const picked = feats.filter(f => SHOW_TICKERS.includes(f.ticker))
    .sort((a,b) => SHOW_TICKERS.indexOf(a.ticker) - SHOW_TICKERS.indexOf(b.ticker));
  let h = "";
  picked.forEach(f => {
    const cls = f.value > 0 ? "up" : f.value < 0 ? "down" : "";
    const sign = f.value > 0 ? "+" : "";
    h += `<div class="sig-card">
      <div class="sig-name">${SIG_LABEL[f.ticker] || f.name}</div>
      <div class="sig-val ${cls}">${sign}${f.value.toFixed(2)}%</div>
      <div class="sig-hint">${SIG_HINT[f.ticker] || ""}</div>
    </div>`;
  });
  document.getElementById("signalsGrid").innerHTML = h;
}

/* ── 詳細面板展開 ── */
function toggleDetail(){
  const panel = document.getElementById("detailPanel");
  const btn = document.getElementById("detailToggle");
  const isOpen = panel.classList.contains("open");
  panel.classList.toggle("open", !isOpen);
  btn.classList.toggle("open", !isOpen);
  // 如果第一次展開且研究資料已載入，渲染
  if(!isOpen && RESEARCH) renderTarget(curT);
  if(!isOpen && window._today) renderMiniSignals(window._today.predictions);
}

function renderMiniSignals(preds){
  const gap = preds.gap, day = preds.day;
  document.getElementById("miniSignals").innerHTML = `
    <div class="mini-sig">
      <div class="n">開盤跳空預測</div>
      <div class="v ${sc(gap.direction)}">${gap.direction}</div>
    </div>
    <div class="mini-sig">
      <div class="n">全日方向預測</div>
      <div class="v ${sc(day.direction)}">${day.direction}</div>
    </div>`;
}

/* ── 研究資料 ── */
async function loadResearch(){
  try{
    const d = await (await fetch("/api/research")).json();
    if(d.error) throw new Error(d.error);
    RESEARCH = d;
    const s = d.sample;
    document.getElementById("resMeta").textContent =
      `樣本 ${s.n} 日（${s.start} ~ ${s.end}）· 特徵 ${s.features.length} 項 · 來回成本 ${s.cost_rt_bps}bps`;
    if(document.getElementById("detailPanel").classList.contains("open"))
      renderTarget(curT);
  }catch(e){
    document.getElementById("killBox").innerHTML = `<div class="err">研究資料載入失敗：${e.message}</div>`;
  }
}

document.getElementById("seg").addEventListener("click", e => {
  if(e.target.tagName !== "BUTTON") return;
  document.querySelectorAll("#seg button").forEach(b => b.classList.remove("on"));
  e.target.classList.add("on");
  curT = e.target.dataset.t;
  if(RESEARCH) renderTarget(curT);
});

function renderTarget(t){
  const tg = RESEARCH.targets[t];
  renderKill(tg.kill);
  renderMetrics(tg.metrics);
  renderConf(tg.confidence);
  renderCorr(tg.correlations);
}

function renderKill(k){
  document.getElementById("killBox").innerHTML =
    `<div class="kill ${k.pass ? 'pass' : 'fail'}">
      <span class="badge">${k.pass ? 'PASS' : 'HOLD'}</span>
      <span class="txt">${k.verdict}${k.expectancy_bps != null ? `　期望值 ${fmt(k.expectancy_bps)}bps · PF ${show(k.profit_factor)}` : ''}</span>
    </div>`;
}

function metric(label, val, good){
  const cls = good === true ? "good" : good === false ? "bad" : "";
  return `<div class="metric"><div class="ml">${label}</div><div class="mv ${cls}">${show(val)}</div></div>`;
}

function renderMetrics(m){
  if(!m || m.n_trades === 0){
    document.getElementById("metrics").innerHTML = `<div class="loading">無交易記錄</div>`; return;
  }
  document.getElementById("metrics").innerHTML =
    metric("每筆期望值", fmt(m.expectancy_bps) + " bps", m.expectancy_bps > 0) +
    metric("Profit Factor", show(m.profit_factor), (m.profit_factor || 0) > 1) +
    metric("Sharpe", show(m.sharpe), (m.sharpe || 0) > 0) +
    metric("最大回撤", m.max_dd_bps + " bps", false) +
    metric("勝率", (m.win_rate * 100).toFixed(1) + "%", null) +
    metric("交易次數", m.n_trades + ` (${(m.trade_rate * 100).toFixed(0)}%)`, null);
}

function renderConf(rows){
  const maxA = Math.max(1, ...rows.map(r => Math.abs(r.mean_bps || 0)));
  let h = `<thead><tr><th>信心區間</th><th>樣本</th><th>命中率</th><th>平均報酬</th><th></th></tr></thead><tbody>`;
  rows.forEach(r => {
    if(!r.n){ h += `<tr class="dim"><td>${r.bucket}</td><td>0</td><td>—</td><td>—</td><td></td></tr>`; return; }
    const w = Math.round(Math.abs(r.mean_bps) / maxA * 80);
    h += `<tr><td class="mono">${r.bucket}</td><td class="mono">${r.n}</td>
      <td class="mono">${(r.hit_rate * 100).toFixed(1)}%</td>
      <td class="mono" style="color:${r.mean_bps >= 0 ? 'var(--gold)' : 'var(--up)'}">${fmt(r.mean_bps)}</td>
      <td><span class="bar ${r.mean_bps >= 0 ? 'g' : 'r'}" style="width:${w}px"></span></td></tr>`;
  });
  document.getElementById("confTable").innerHTML = h + `</tbody>`;
}

function renderCorr(rows){
  let h = `<thead><tr><th>標的</th><th>Pearson r</th><th>顯著</th></tr></thead><tbody>`;
  rows.forEach(c => {
    h += `<tr><td>${c.name}</td>
      <td class="mono ${c.pearson > 0 ? 'pos' : 'neg'}">${fmt(c.pearson)}</td>
      <td><span class="tag ${c.fdr_sig ? 'sig' : ''}">${c.fdr_sig ? '✓' : '—'}</span></td></tr>`;
  });
  document.getElementById("corrTable").innerHTML = h + `</tbody>`;
}

/* ── 重抓 ── */
async function doRefresh(){
  const b = document.getElementById("refreshBtn");
  b.disabled = true; b.textContent = "更新中…";
  try{ await fetch("/api/refresh", { method: "POST" }); location.reload(); }
  catch(e){ b.disabled = false; b.textContent = "重抓資料"; alert("失敗：" + e.message); }
}

load();
</script>
</body>
</html>
