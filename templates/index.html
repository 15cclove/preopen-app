<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法科盤前</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0d14;--surface:#121622;--surface2:#181d2c;
  --line:rgba(255,255,255,.07);--line2:rgba(255,255,255,.13);
  --text:#e7eaf2;--muted:#838aaa;--dimmed:#555d7a;
  --up:#ff4d56;--down:#1fd1a3;--gold:#d4af37;--neutral:#7a8094;
  --mono:"JetBrains Mono",monospace;
  --sans:"Noto Sans TC",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);
  line-height:1.65;-webkit-font-smoothing:antialiased;min-height:100vh}

header{border-bottom:1px solid var(--line);padding:14px 20px;
  background:rgba(10,13,20,.9);backdrop-filter:blur(10px);
  position:sticky;top:0;z-index:20;
  display:flex;align-items:center;justify-content:space-between}
.brand{font-size:16px;font-weight:700;letter-spacing:1px}
.brand span{color:var(--muted);font-weight:400;font-size:13px;margin-left:8px}
.hright{display:flex;align-items:center;gap:10px}
.datebadge{font-family:var(--mono);font-size:11px;color:var(--muted)}
.refresh-btn{font-family:var(--mono);font-size:12px;
  background:var(--surface2);color:var(--muted);
  border:1px solid var(--line2);border-radius:6px;
  padding:6px 12px;cursor:pointer;transition:.15s}
.refresh-btn:hover{color:var(--text);border-color:rgba(255,255,255,.25)}
.refresh-btn:disabled{opacity:.4;cursor:wait}

main{max-width:580px;margin:0 auto;padding:28px 20px 80px}

/* ── 今日建議卡（主角） ── */
.hero{border-radius:20px;background:var(--surface);
  border:1px solid var(--line2);padding:32px 24px 28px;margin-bottom:20px;text-align:center}
.hero-label{font-size:12px;color:var(--muted);letter-spacing:2px;margin-bottom:20px}

.stamp{width:148px;height:148px;border-radius:50%;margin:0 auto 22px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border:3px solid var(--neutral);
  box-shadow:0 0 0 5px var(--bg),0 0 0 6px var(--neutral);transition:.3s}
.stamp.up{border-color:var(--up);box-shadow:0 0 0 5px var(--bg),0 0 0 6px var(--up),0 0 40px rgba(255,77,86,.22)}
.stamp.down{border-color:var(--down);box-shadow:0 0 0 5px var(--bg),0 0 0 6px var(--down),0 0 40px rgba(31,209,163,.18)}
.stamp-zh{font-size:46px;font-weight:900;line-height:1}
.stamp.up .stamp-zh{color:var(--up)}
.stamp.down .stamp-zh{color:var(--down)}
.stamp.neutral .stamp-zh{color:var(--neutral)}
.stamp-en{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px}

.hero-title{font-size:20px;font-weight:700;margin-bottom:8px}
.hero-sub{font-size:14px;color:var(--muted);margin-bottom:22px;min-height:1.4em}

.conf-row{display:flex;align-items:center;justify-content:center;gap:10px}
.conf-track{width:160px;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.conf-fill{height:100%;border-radius:3px;background:var(--gold);transition:width .5s}
.conf-txt{font-family:var(--mono);font-size:12px;color:var(--muted)}

/* ── 今天怎麼操作（3步驟） ── */
.steps{background:var(--surface);border:1px solid var(--line2);border-radius:16px;
  padding:20px;margin-bottom:20px}
.steps-title{font-size:13px;font-weight:700;margin-bottom:14px;color:var(--text)}
.step{display:flex;gap:14px;margin-bottom:12px;align-items:flex-start}
.step:last-child{margin-bottom:0}
.step-num{width:26px;height:26px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:12px;font-weight:700;
  background:var(--surface2);border:1px solid var(--line2);color:var(--muted)}
.step-body{font-size:14px;padding-top:3px}
.step-body strong{display:block;font-weight:700;margin-bottom:2px}
.step-body p{font-size:13px;color:var(--muted);margin:0}

/* ── 盤前訊號 ── */
.section-hd{font-size:12px;font-weight:700;letter-spacing:1px;color:var(--muted);
  text-transform:uppercase;margin-bottom:12px;
  display:flex;align-items:center;gap:8px}
.section-hd::after{content:'';flex:1;height:1px;background:var(--line)}

.signals{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.sig{background:var(--surface);border:1px solid var(--line);
  border-radius:12px;padding:14px 16px;
  display:flex;align-items:center;gap:14px}
.sig-icon{font-size:22px;width:34px;text-align:center;flex-shrink:0}
.sig-body{flex:1}
.sig-name{font-size:12px;color:var(--muted);margin-bottom:2px}
.sig-read{font-size:14px;font-weight:600}
.sig-read.up{color:var(--up)} .sig-read.down{color:var(--down)} .sig-read.flat{color:var(--neutral)}
.sig-val{font-family:var(--mono);font-size:14px;font-weight:600;flex-shrink:0;text-align:right}
.sig-val.up{color:var(--up)} .sig-val.down{color:var(--down)}

/* ── 展開區（技術細節） ── */
.toggle-btn{width:100%;background:var(--surface);border:1px solid var(--line2);
  border-radius:12px;color:var(--muted);font-family:var(--sans);font-size:13px;
  padding:14px 18px;cursor:pointer;text-align:left;
  display:flex;align-items:center;justify-content:space-between;transition:.15s}
.toggle-btn:hover{border-color:rgba(255,255,255,.2);color:var(--text)}
.toggle-btn .arr{font-size:10px;transition:transform .25s}
.toggle-btn.open .arr{transform:rotate(180deg)}
.panel{display:none;background:var(--surface);border:1px solid var(--line2);
  border-top:none;border-radius:0 0 12px 12px;padding:20px}
.panel.open{display:block}

.eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:2px;
  color:var(--muted);text-transform:uppercase;margin:18px 0 8px}
.eyebrow:first-child{margin-top:0}
.kill{display:flex;align-items:center;gap:10px;border-radius:8px;
  padding:12px 14px;margin-bottom:4px;border:1px solid var(--line2);background:var(--surface2)}
.kill .badge{font-family:var(--mono);font-size:11px;font-weight:700;
  padding:4px 10px;border-radius:5px;white-space:nowrap}
.kill.pass .badge{background:rgba(212,175,55,.15);color:var(--gold)}
.kill.fail .badge{background:rgba(122,128,148,.12);color:var(--muted)}
.kill .txt{font-size:12px;color:var(--muted)}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
.metric{background:var(--surface2);border:1px solid var(--line);border-radius:8px;padding:11px 13px}
.metric .ml{font-size:11px;color:var(--muted);margin-bottom:4px}
.metric .mv{font-family:var(--mono);font-size:18px;font-weight:600}
.metric .mv.good{color:var(--gold)} .metric .mv.bad{color:var(--up)}
.seg{display:inline-flex;background:var(--surface2);border:1px solid var(--line);
  border-radius:8px;padding:3px;gap:3px;margin:8px 0 12px}
.seg button{font-family:var(--mono);font-size:11px;background:transparent;
  color:var(--muted);border:none;border-radius:6px;padding:6px 12px;cursor:pointer}
.seg button.on{background:var(--bg);color:var(--text)}
table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:4px}
th,td{text-align:right;padding:8px 10px;border-bottom:1px solid var(--line)}
th:first-child,td:first-child{text-align:left}
th{font-family:var(--mono);font-size:10px;color:var(--muted);font-weight:400}
td.mono{font-family:var(--mono)}
.bar{display:inline-block;height:6px;border-radius:2px;vertical-align:middle}
.bar.g{background:var(--gold)} .bar.r{background:var(--up)}
.tag{display:inline-block;font-family:var(--mono);font-size:10px;
  padding:1px 6px;border-radius:3px;border:1px solid var(--line2);color:var(--muted)}
.tag.sig{color:var(--gold);border-color:rgba(212,175,55,.5)}
tr.dim{opacity:.4}

.note-box{font-size:12px;color:var(--muted);background:var(--surface2);
  border-left:3px solid var(--line2);border-radius:4px;padding:10px 13px;margin-bottom:8px}

.disclaimer{margin-top:28px;font-size:11px;color:var(--dimmed);
  border-top:1px solid var(--line);padding-top:14px;text-align:center}
</style>
</head>
<body>

<header>
  <div class="brand">法科盤前<span>台指期方向預測</span></div>
  <div class="hright">
    <span class="datebadge" id="asof">—</span>
    <button class="refresh-btn" id="refreshBtn" onclick="doRefresh()">重抓最新資料</button>
  </div>
</header>

<main>

  <!-- ── 今日建議（主角） ── -->
  <div class="hero" id="heroCard">
    <div class="hero-label">今日台指期操作建議</div>
    <div class="stamp neutral" id="stamp">
      <div class="stamp-zh" id="stampZh">—</div>
      <div class="stamp-en" id="stampEn">載入中</div>
    </div>
    <div class="hero-title" id="heroTitle">正在分析市場資料⋯</div>
    <div class="hero-sub" id="heroSub"></div>
    <div class="conf-row">
      <span class="conf-txt">訊號強度</span>
      <div class="conf-track"><div class="conf-fill" id="confFill" style="width:0"></div></div>
      <span class="conf-txt" id="confPct">—</span>
    </div>
  </div>

  <!-- ── 今天怎麼操作 ── -->
  <div class="steps" id="stepsCard" style="display:none">
    <div class="steps-title">今天怎麼操作</div>
    <div id="stepsBody"></div>
  </div>

  <!-- ── 盤前訊號解讀 ── -->
  <div class="section-hd">盤前市場訊號</div>
  <div class="signals" id="signals">
    <div style="color:var(--muted);font-size:13px;padding:8px 0">載入中…</div>
  </div>

  <!-- ── 技術分析（可展開） ── -->
  <button class="toggle-btn" id="detailToggle" onclick="togglePanel()">
    <span>查看統計分析報告（給想深入研究的人）</span>
    <span class="arr">▼</span>
  </button>
  <div class="panel" id="detailPanel">
    <div class="note-box" id="noteBox"></div>

    <div class="eyebrow">切換預測目標</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:6px">
      開盤跳空 = 今天開盤比昨天高/低多少（開盤那一刻定了）／日內延續 = 開盤後到收盤的走勢（可操作）／全日方向 = 整天漲跌含跳空
    </div>
    <div class="seg" id="seg">
      <button data-t="intraday" class="on">日內延續（主）</button>
      <button data-t="gap">開盤跳空</button>
      <button data-t="day">全日方向</button>
    </div>

    <div id="killBox"></div>

    <div class="eyebrow">樣本外交易績效（已扣手續費＋滑價）</div>
    <div class="mgrid" id="metrics"></div>

    <div class="eyebrow">信心分位數 vs 報酬</div>
    <table id="confTable"><tbody><tr><td style="color:var(--muted);font-size:12px">…</td></tr></tbody></table>

    <div class="eyebrow">相關性排名</div>
    <table id="corrTable"><tbody><tr><td style="color:var(--muted);font-size:12px">…</td></tr></tbody></table>

    <p style="font-size:11px;color:var(--muted);margin-top:16px" id="resMeta"></p>
  </div>

  <p class="disclaimer">本頁為量化模型輔助訊號，非投資建議。過去績效不代表未來結果。</p>
</main>

<script>
const fmt = v => (v > 0 ? "+" : "") + Number(v).toFixed(2);
const show = v => (v === null || v === undefined) ? "—" : v;
let RESEARCH = null, curT = "intraday";

async function load(){ loadToday(); loadResearch(); }

async function loadToday(){
  try{
    const d = await (await fetch("/api/today")).json();
    if(d.error) throw new Error(d.error);
    document.getElementById("asof").textContent = d.date + " 盤前";
    renderHero(d);
    renderSignals(d.features);
    window._today = d;
  }catch(e){
    document.getElementById("heroTitle").textContent = "載入失敗：" + e.message;
  }
}

const CFG = {
  "偏多": {
    cls:"up", zh:"多", en:"偏多",
    title:"今天偏多，尋找做多進場點",
    sub:"盤中回調後找支撐反彈的機會做多，避免逆勢做空",
    steps:[
      ["等待回調再進場","不急著開盤就衝，等價格回測支撐，或突破前高站穩後再考慮做多"],
      ["只做多、不做空","今天訊號偏多，逆勢放空風險較高，建議不操作"],
      ["設好停損","進場後設好停損點，若破支撐立即出場，不凹單"],
    ]
  },
  "偏空":{
    cls:"down", zh:"空", en:"偏空",
    title:"今天偏空，尋找做空進場點",
    sub:"盤中反彈時找壓力放空，避免逆勢做多",
    steps:[
      ["等待反彈再進場","不急著開盤就放空，等價格反彈到壓力區，或跌破支撐後再考慮做空"],
      ["只做空、不做多","今天訊號偏空，逆勢做多風險較高，建議不操作"],
      ["設好停損","進場後設好停損點，若突破壓力立即出場，不凹單"],
    ]
  },
  "中性":{
    cls:"neutral", zh:"觀", en:"中性",
    title:"今天方向不明，建議觀望",
    sub:"市場訊號混雜，不宜強押方向",
    steps:[
      ["先觀望，等盤中出方向","開盤後先看 30～60 分鐘，等出現明確的多空方向再決定"],
      ["小量試單或不交易","如果真的想做，只用小部位，隨時準備停損出場"],
      ["重視停損","中性盤容易來回洗，進場就要有明確停損點，不能沒有"],
    ]
  },
};

function sc(dir){ return dir==="偏多"?"up":dir==="偏空"?"down":"neutral"; }

function renderHero(d){
  const m = d.predictions.intraday;
  const dir = m.direction;
  const c = CFG[dir] || CFG["中性"];
  document.getElementById("stamp").className = "stamp " + c.cls;
  document.getElementById("stampZh").textContent = c.zh;
  document.getElementById("stampEn").textContent = c.en;
  document.getElementById("heroTitle").textContent = c.title;
  document.getElementById("heroSub").textContent = c.sub;
  document.getElementById("confFill").style.width = m.confidence + "%";
  document.getElementById("confPct").textContent = m.confidence + "%";

  const body = document.getElementById("stepsBody");
  body.innerHTML = c.steps.map(([h,p],i)=>
    `<div class="step">
      <div class="step-num">${i+1}</div>
      <div class="step-body"><strong>${h}</strong><p>${p}</p></div>
    </div>`).join("");
  document.getElementById("stepsCard").style.display = "";
}

const SIG_META = {
  "NQ=F":{ icon:"🇺🇸", label:"美國科技股（納指）昨夜收盤",
    read: v => v > 1?["大漲，台股今天開盤通常偏多","up"]
              :v > 0.2?["小漲，輕微偏多參考","up"]
              :v < -1?["大跌，台股今天開盤通常偏空","down"]
              :v < -0.2?["小跌，輕微偏空參考","down"]
              :["平盤，方向參考不明","flat"] },
  "ES=F":{ icon:"🇺🇸", label:"美國大盤（標普500）昨夜收盤",
    read: v => v > 1?["大漲，整體市場氣氛樂觀","up"]
              :v > 0.2?["小漲，市場偏樂觀","up"]
              :v < -1?["大跌，市場氣氛悲觀","down"]
              :v < -0.2?["小跌，市場偏保守","down"]
              :["平盤，影響不大","flat"] },
  "^KS11":{ icon:"🇰🇷", label:"韓股（KOSPI）今早開盤",
    read: v => v > 0.5?["今早韓股上漲，亞洲同步偏多","up"]
              :v < -0.5?["今早韓股下跌，亞洲同步偏空","down"]
              :["今早韓股平盤，參考有限","flat"] },
  "^N225":{ icon:"🇯🇵", label:"日股（日經225）今早開盤",
    read: v => v > 0.5?["今早日股上漲，亞洲偏多","up"]
              :v < -0.5?["今早日股下跌，亞洲偏空","down"]
              :["今早日股平盤，參考有限","flat"] },
  "TWD=X":{ icon:"💱", label:"台幣匯率昨夜",
    read: v => v > 0.3?["台幣貶值，外資可能偏空台股","down"]
              :v < -0.3?["台幣升值，外資可能偏多台股","up"]
              :["匯率變動不大，影響有限","flat"] },
  "^VIX":{ icon:"⚡", label:"市場恐慌指數（VIX）昨夜",
    read: v => v > 5?["恐慌大漲，市場波動風險高，留意急殺","down"]
              :v > 2?["恐慌上升，注意風險","down"]
              :v < -2?["恐慌下降，市場偏樂觀","up"]
              :["恐慌指數平穩，無特別訊號","flat"] },
};
const ORDER = ["NQ=F","ES=F","^KS11","^N225","TWD=X","^VIX"];

function renderSignals(feats){
  const map = {};
  feats.forEach(f => map[f.ticker] = f);
  const html = ORDER.filter(t=>map[t]).map(t=>{
    const f = map[t];
    const meta = SIG_META[t] || {icon:"📊",label:f.name,read:v=>[v>0?"上漲":"下跌",v>0?"up":"down"]};
    const [readTxt,readCls] = meta.read(f.value);
    const sign = f.value > 0 ? "+" : "";
    const valCls = f.value > 0 ? "up" : f.value < 0 ? "down" : "";
    return `<div class="sig">
      <div class="sig-icon">${meta.icon}</div>
      <div class="sig-body">
        <div class="sig-name">${meta.label}</div>
        <div class="sig-read ${readCls}">${readTxt}</div>
      </div>
      <div class="sig-val ${valCls}">${sign}${f.value.toFixed(2)}%</div>
    </div>`;
  }).join("");
  document.getElementById("signals").innerHTML = html || `<div style="color:var(--muted);font-size:13px">無訊號資料</div>`;
}

function togglePanel(){
  const panel = document.getElementById("detailPanel");
  const btn   = document.getElementById("detailToggle");
  const open  = !panel.classList.contains("open");
  panel.classList.toggle("open",open);
  btn.classList.toggle("open",open);
  if(open && RESEARCH) renderTarget(curT);
}

document.getElementById("seg").addEventListener("click",e=>{
  if(e.target.tagName!=="BUTTON") return;
  document.querySelectorAll("#seg button").forEach(b=>b.classList.remove("on"));
  e.target.classList.add("on");
  curT = e.target.dataset.t;
  if(RESEARCH) renderTarget(curT);
});

async function loadResearch(){
  try{
    const d = await (await fetch("/api/research")).json();
    if(d.error) throw new Error(d.error);
    RESEARCH = d;
    const s = d.sample;
    document.getElementById("resMeta").textContent =
      `分析樣本：${s.n} 個交易日（${s.start} ～ ${s.end}）· 特徵 ${s.features.length} 項 · 每次來回成本 ${s.cost_rt_bps}bps`;
    document.getElementById("noteBox").textContent = d.note || "";
    if(document.getElementById("detailPanel").classList.contains("open"))
      renderTarget(curT);
  }catch(e){ console.error(e); }
}

function renderTarget(t){
  const tg = RESEARCH.targets[t];
  renderKill(tg.kill);
  renderMetrics(tg.metrics);
  renderConf(tg.confidence);
  renderCorr(tg.correlations);
}

function renderKill(k){
  document.getElementById("killBox").innerHTML =
    `<div class="kill ${k.pass?'pass':'fail'}">
      <span class="badge">${k.pass?'✓ 通過檢核':'✗ 尚無交易優勢'}</span>
      <span class="txt">${k.verdict}${k.expectancy_bps!=null?`　期望值 ${fmt(k.expectancy_bps)}bps`:''}</span>
    </div>`;
}
function metric(l,v,good){
  const cls = good===true?"good":good===false?"bad":"";
  return `<div class="metric"><div class="ml">${l}</div><div class="mv ${cls}">${show(v)}</div></div>`;
}
function renderMetrics(m){
  if(!m||m.n_trades===0){
    document.getElementById("metrics").innerHTML=`<div style="color:var(--muted);font-size:12px">無交易記錄</div>`;return;
  }
  document.getElementById("metrics").innerHTML=
    metric("每筆期望值",fmt(m.expectancy_bps)+" bps",m.expectancy_bps>0)+
    metric("Profit Factor",show(m.profit_factor),(m.profit_factor||0)>1)+
    metric("Sharpe",show(m.sharpe),(m.sharpe||0)>0)+
    metric("最大回撤",m.max_dd_bps+" bps",false)+
    metric("勝率",(m.win_rate*100).toFixed(1)+"%",null)+
    metric("交易次數",m.n_trades+` (${(m.trade_rate*100).toFixed(0)}%)`,null);
}
function renderConf(rows){
  const maxA=Math.max(1,...rows.map(r=>Math.abs(r.mean_bps||0)));
  let h=`<thead><tr><th>信心區間</th><th>樣本</th><th>命中率</th><th>平均報酬</th><th></th></tr></thead><tbody>`;
  rows.forEach(r=>{
    if(!r.n){h+=`<tr class="dim"><td>${r.bucket}</td><td>0</td><td>—</td><td>—</td><td></td></tr>`;return;}
    const w=Math.round(Math.abs(r.mean_bps)/maxA*80);
    h+=`<tr><td class="mono">${r.bucket}</td><td class="mono">${r.n}</td>
      <td class="mono">${(r.hit_rate*100).toFixed(1)}%</td>
      <td class="mono" style="color:${r.mean_bps>=0?'var(--gold)':'var(--up)'}">${fmt(r.mean_bps)}</td>
      <td><span class="bar ${r.mean_bps>=0?'g':'r'}" style="width:${w}px"></span></td></tr>`;
  });
  document.getElementById("confTable").innerHTML=h+`</tbody>`;
}
function renderCorr(rows){
  let h=`<thead><tr><th>標的</th><th>Pearson r</th><th>統計顯著</th></tr></thead><tbody>`;
  rows.forEach(c=>{
    h+=`<tr><td>${c.name}</td>
      <td class="mono" style="color:${c.pearson>0?'var(--up)':'var(--down)'}">${fmt(c.pearson)}</td>
      <td><span class="tag ${c.fdr_sig?'sig':''}">${c.fdr_sig?'✓ 顯著':'—'}</span></td></tr>`;
  });
  document.getElementById("corrTable").innerHTML=h+`</tbody>`;
}

async function doRefresh(){
  const b=document.getElementById("refreshBtn");
  b.disabled=true;b.textContent="更新中…";
  try{ await fetch("/api/refresh",{method:"POST"}); location.reload(); }
  catch(e){ b.disabled=false;b.textContent="重抓最新資料";alert("失敗："+e.message); }
}

load();
</script>
